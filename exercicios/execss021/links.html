<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited{
            color: darkred;
        }

        a:hover{
            color: black;
            text-decoration: underline;
        }
        a:active{
            color: lightblue;
        }
        div{
            background-color: lightblue;
            height: 150px;
            width: 150px;
            border-radius: 50%;
            line-height: 150px;
            text-align: center;
        }

        a::before{
            content: '-> ';
        }

        a::after{
            content: ' [link]';
            text-decoration: none;
            font-weight: normal;
            color: darkgray;
        }

    </style>
    <title>Links</title>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://github.com/Levizx-code?tab=repositories" target="_blank" rel="external">Repositorio do Github</a></li>

        <li><a href="https://www.youtube.com/" target="_blank" rel="external">Canal do Youtube</a></li>

        <li><a href="https://www.cursoemvideo.com" target="_blank" rel="external">Site do Curso em video</a></li>
    </ul>

</body>
</html>
