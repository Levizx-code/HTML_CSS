<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        h1{/*Box - level*/
            background-color: lightgray;
            height: 300px;
            width: 300px;
           
            border: 10px solid black;

            padding: 10px 10px 10px 10px;

            margin: 20px auto 40px auto;

            outline: 5px dashed red;
        }
        a{/*Box-inline*/
            border-width: 7px;
            border-style: solid;
            border-color: red;

            padding-top: 10px;
            padding-right: 10px;
            padding-left: 10px;
            padding-bottom: 10px;

        }
    </style>
    <title>modelo de caixas</title>
</head>
<body>
    <h1>Exemplo de caixas box-level</h1>
    <p>Paragrafos tambem sao exemplos de box-level, mas <a href="#">links sao exemplos de caixas inline-level</a>. vamos ver como tudo isso funciona</p>
</body>
</html>
