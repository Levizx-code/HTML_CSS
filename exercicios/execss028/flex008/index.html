<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.conteiner{
            background-color: lightcoral;
            display: flex;
            
            align-items: flex-start;
            flex-flow: row nowrap;
            height: 400px;
        }
        div.item{
            background-color: aquamarine;
            border: 1px solid black;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item">A</div>
        <div class="item" style="align-self: auto;">B</div>
        <div class="item" style="align-self: flex-end;">C</div>
        <div class="item" style="align-self: stretch;">D</div>
        <div class="item" style="align-self: center;">E</div>
    </div>
</body>
</html>
