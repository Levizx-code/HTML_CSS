<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        fieldset{
            border: 2px solid black;
        }
    </style>
    <title>Document</title>
</head>
<body>
    <h1>
        Exemplo de formularios
    </h1>
<form action="" method="get">


    <fieldset>
        <legend>Sexo</legend>
        <input type="radio" name="sex" id="sxmas"> <label for="sxmas">Masculino</label>
        <input type="radio" name="sex" id="sxfem"> <label for="sxfem">Feminino</label>
    </fieldset>

    <fieldset>  
        <legend>Esportes favoritos</legend>

        <input type="checkbox" name="esfut" id="iesfut" > <label for="iesfut">Futebol</label> <br>

        <input type="checkbox" name="esvol" id="iesvol"> <label for="iesvol">Volei</label> <br>

        <input type="checkbox" name="esnat" id="iesnat"> <label for="iesnat">Natação</label> <br>

        <input type="checkbox" name="esbas" id="iesbas"> <label for="iesbas">Basquete</label>
    </fieldset>


    <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar">
    </p>
</form>
</body>
</html>
